<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Despensa">
<meta name="description" content="App de compras compartida para el hogar">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Despensa</title>
<style>
:root {
  --bg:       #f5f4f0;
  --bg2:      #eceae4;
  --bg3:      #e0ded8;
  --card:     #ffffff;
  --text:     #1a1a1a;
  --text2:    #666660;
  --text3:    #999994;
  --border:   #d8d6d0;
  --border2:  #c8c6c0;
  --blue:     #2563eb;
  --red:      #dc2626;
  --green:    #16a34a;
  --amber:    #d97706;
  --radius:   12px;
  --radius-sm:8px;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:     #18181b;
    --bg2:    #27272a;
    --bg3:    #3f3f46;
    --card:   #1c1c1f;
    --text:   #fafaf9;
    --text2:  #a1a1aa;
    --text3:  #71717a;
    --border: #3f3f46;
    --border2:#52525b;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  overscroll-behavior: none;
}

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.header {
  padding: env(safe-area-inset-top, 12px) 16px 0;
  padding-top: max(env(safe-area-inset-top), 12px);
  background: var(--bg);
  z-index: 10;
  flex-shrink: 0;
}
.header-row { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; }
.logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.logo span { color: var(--blue); }
.user-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  background: var(--bg2); border: 1px solid var(--border);
  cursor: pointer; font-size: 13px; color: var(--text2);
  font-family: inherit;
  transition: background .15s;
}
.user-pill:active { background: var(--bg3); }
.user-dot { width: 8px; height: 8px; border-radius: 50%; }
.sync-bar {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text3); padding-bottom: 4px;
  font-family: 'Helvetica Neue', sans-serif;
}
.sync-dot { width: 5px; height: 5px; border-radius: 50%; }

/* TABS */
.tabs {
  display: flex; gap: 2px;
  background: var(--bg2); border-radius: var(--radius);
  padding: 3px; margin: 0 16px 12px;
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 7px 4px; border: none; background: none;
  border-radius: var(--radius-sm); font-size: 12px;
  color: var(--text2); cursor: pointer;
  font-family: 'Helvetica Neue', sans-serif;
  font-weight: 500; transition: all .15s;
  white-space: nowrap;
}
.tab.active {
  background: var(--card); color: var(--text);
  box-shadow: var(--shadow);
}

/* CONTENT */
.panels { flex: 1; overflow: hidden; position: relative; }
.panel { display: none; height: 100%; overflow-y: auto; padding: 0 16px 24px; }
.panel.active { display: block; }
.panel::-webkit-scrollbar { width: 3px; }
.panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* SEARCH */
.search-wrap { position: sticky; top: 0; background: var(--bg); padding: 8px 0; z-index: 5; }
.search-input {
  width: 100%; padding: 9px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 14px;
  font-family: 'Helvetica Neue', sans-serif;
  outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }

/* CATEGORY */
.cat-section { margin-bottom: 8px; }
.cat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; cursor: pointer;
  border-radius: var(--radius); background: var(--bg2);
  border: 1px solid var(--border);
  user-select: none; margin-bottom: 4px;
  transition: background .1s;
}
.cat-header:active { background: var(--bg3); }
.cat-emoji { font-size: 16px; }
.cat-label { font-size: 12px; font-weight: 700; flex: 1; text-transform: uppercase; letter-spacing: .06em; font-family: 'Helvetica Neue', sans-serif; color: var(--text2); }
.low-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #fef2f2; color: #991b1b; font-family: 'Helvetica Neue', sans-serif; font-weight: 600; }
.cat-arrow { font-size: 11px; color: var(--text3); transition: transform .2s; }
.cat-arrow.open { transform: rotate(180deg); }
.cat-body { display: none; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 4px; }
.cat-body.open { display: block; }

/* PRODUCT ROW */
.prod-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.prod-row:last-child { border-bottom: none; }
.prod-info { flex: 1; min-width: 0; }
.prod-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prod-meta { font-size: 11px; color: var(--text3); font-family: 'Helvetica Neue', sans-serif; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.price-lbl { color: var(--blue); font-weight: 600; }
.low-warn { color: var(--red); }
.edit-btn {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid var(--border); background: none;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text3); font-size: 12px;
  flex-shrink: 0; transition: border-color .15s;
}
.edit-btn:active { border-color: var(--blue); color: var(--blue); }
.qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg2);
  cursor: pointer; font-size: 17px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); transition: background .1s;
}
.qty-btn:active { background: var(--bg3); }
.qty-num {
  min-width: 28px; text-align: center; font-size: 14px; font-weight: 700;
  font-family: 'Helvetica Neue', sans-serif;
  cursor: pointer; padding: 2px 4px; border-radius: 6px;
  transition: background .1s;
}
.qty-num:active { background: var(--bg2); }
.qty-zero { color: var(--text3); }
.qty-low  { color: var(--red); }

/* LISTA */
.total-banner {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.total-label { font-size: 12px; color: var(--text2); font-family: 'Helvetica Neue', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.total-amount { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.section-sep { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); font-family: 'Helvetica Neue', sans-serif; padding: 12px 0 6px; }

/* SHOP CARD - lista de compras */
.shop-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 12px; margin-bottom: 5px;
  box-shadow: var(--shadow);
}
.shop-card-top {
  display: flex; align-items: flex-start; gap: 10px;
}
.check-circle {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px; transition: all .15s;
}
.check-circle.done { background: var(--green); border-color: var(--green); color: #fff; font-size: 12px; }
.shop-info { flex: 1; min-width: 0; }
.shop-name { font-size: 13px; }
.shop-name.done { text-decoration: line-through; color: var(--text3); }
.shop-sub { font-size: 11px; color: var(--text2); font-family: 'Helvetica Neue', sans-serif; margin-top: 2px; }
.shop-price { font-size: 13px; font-weight: 700; color: var(--blue); white-space: nowrap; flex-shrink: 0; font-family: 'Helvetica Neue', sans-serif; }

/* CAMPOS DE COMPRA en lista */
.shop-fields {
  display: flex; gap: 8px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.shop-field {
  flex: 1; display: flex; flex-direction: column; gap: 3px;
}
.shop-field label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text3);
  font-family: 'Helvetica Neue', sans-serif;
}
.shop-field input {
  width: 100%; padding: 7px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 14px; font-family: 'Helvetica Neue', sans-serif;
  outline: none; transition: border-color .15s;
  -webkit-appearance: none;
}
.shop-field input:focus { border-color: var(--blue); background: var(--card); }
.shop-subtotal {
  font-size: 12px; color: var(--text2); font-family: 'Helvetica Neue', sans-serif;
  text-align: right; margin-top: 6px; padding-top: 4px;
  border-top: 1px solid var(--border); font-weight: 600;
}
.shop-subtotal span { color: var(--blue); }

/* TOTAL PARCIAL EN TIEMPO REAL */
.running-total {
  position: sticky; bottom: 0; left: 0; right: 0;
  background: var(--bg); padding: 10px 16px 12px;
  border-top: 2px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  z-index: 20;
  margin: 0 -16px;
}
.running-total-label { font-size: 12px; color: var(--text2); font-family: 'Helvetica Neue', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.running-total-amount { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--blue); }

.btn-clear {
  display: block; width: 100%; margin-top: 12px; margin-bottom: 60px; padding: 11px;
  background: var(--green); border: none;
  border-radius: var(--radius); color: #fff;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: opacity .15s;
}
.btn-clear:active { opacity: .8; }
.btn-clear-sec {
  display: block; width: 100%; margin-top: 8px; margin-bottom: 60px; padding: 11px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text2);
  font-size: 13px; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.btn-clear-sec:active { background: var(--bg3); }

/* RESUMEN FINAL */
.resumen-card {
  background: var(--text); color: var(--bg);
  border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.resumen-title { font-size: 11px; font-family: 'Helvetica Neue', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; opacity: .6; }
.resumen-total { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-top: 4px; }
.resumen-sub { font-size: 12px; opacity: .5; font-family: 'Helvetica Neue', sans-serif; margin-top: 2px; }
.resumen-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; font-family: 'Helvetica Neue', sans-serif;
}
.resumen-row:last-child { border-bottom: none; }
.resumen-row-label { color: var(--text2); }
.resumen-row-val { font-weight: 700; color: var(--blue); }

/* PRESUPUESTO */
.grand-card {
  background: var(--text); color: var(--bg);
  border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.grand-lbl { font-size: 11px; font-family: 'Helvetica Neue', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; opacity: .6; }
.grand-num { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-top: 4px; }
.grand-sub { font-size: 12px; opacity: .5; font-family: 'Helvetica Neue', sans-serif; margin-top: 2px; }
.budget-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  margin-bottom: 8px; box-shadow: var(--shadow);
}
.bcat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.bcat-name { font-size: 13px; font-weight: 700; flex: 1; }
.bcat-total { font-size: 16px; font-weight: 700; color: var(--blue); font-family: 'Helvetica Neue', sans-serif; }
.bar-bg { height: 3px; background: var(--bg2); border-radius: 2px; margin-bottom: 10px; }
.bar-fill { height: 3px; border-radius: 2px; transition: width .4s; }
.bitem { display: flex; justify-content: space-between; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; font-family: 'Helvetica Neue', sans-serif; }
.bitem:last-child { border-bottom: none; }
.bitem-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
.bitem-price { color: var(--text); font-weight: 600; flex-shrink: 0; }

/* AGREGAR */
.form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.form-card label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); font-family: 'Helvetica Neue', sans-serif; margin-bottom: 5px; }
.form-card input, .form-card select {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 14px; font-family: inherit;
  outline: none; margin-bottom: 12px; transition: border-color .15s;
}
.form-card input:focus, .form-card select:focus { border-color: var(--blue); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.btn-add {
  width: 100%; padding: 12px; background: var(--text); color: var(--bg);
  border: none; border-radius: var(--radius); font-size: 15px;
  font-family: inherit; font-weight: 700; cursor: pointer; transition: opacity .15s;
}
.btn-add:active { opacity: .7; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 200;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 16px max(env(safe-area-inset-bottom), 24px);
  width: 100%; max-width: 480px;
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
.modal-close { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text2); line-height: 1; }
.modal-input {
  width: 100%; padding: 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 18px; font-family: 'Helvetica Neue', sans-serif;
  outline: none; margin-bottom: 12px;
}
.modal-input:focus { border-color: var(--blue); }
.modal-input-sm {
  width: 100%; padding: 10px 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 15px; font-family: 'Helvetica Neue', sans-serif;
  outline: none; margin-bottom: 10px;
}
.modal-input-sm:focus { border-color: var(--blue); }
.modal-select {
  width: 100%; padding: 10px 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 15px; font-family: 'Helvetica Neue', sans-serif;
  outline: none; margin-bottom: 10px;
}
.modal-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); font-family: 'Helvetica Neue', sans-serif; margin-bottom: 5px; display: block; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.modal-grid > div { display: flex; flex-direction: column; }
.btn-save {
  width: 100%; padding: 13px; background: var(--blue); color: #fff;
  border: none; border-radius: var(--radius); font-size: 16px;
  font-family: inherit; font-weight: 700; cursor: pointer; margin-bottom: 8px;
}
.btn-delete {
  width: 100%; padding: 11px; background: none; color: var(--red);
  border: 1px solid var(--red); border-radius: var(--radius); font-size: 14px;
  font-family: inherit; cursor: pointer;
}
.btn-delete:active { background: #fef2f2; }

/* MODAL STOCK */
.stock-big-input {
  width: 100%; padding: 14px; border-radius: var(--radius);
  border: 2px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 28px; font-weight: 700;
  font-family: 'Helvetica Neue', sans-serif; text-align: center;
  outline: none; margin-bottom: 12px;
}
.stock-big-input:focus { border-color: var(--blue); }

.user-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: var(--radius); cursor: pointer;
  transition: background .1s; margin-bottom: 4px;
}
.user-opt:active, .user-opt.sel { background: var(--bg2); }
.user-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; font-family: 'Helvetica Neue', sans-serif; flex-shrink: 0; }
.user-opt-name { font-weight: 700; font-size: 15px; }
.user-opt-sub { font-size: 12px; color: var(--text2); font-family: 'Helvetica Neue', sans-serif; }

.empty { text-align: center; padding: 40px 16px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.install-tip { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; font-size: 12px; color: #1e40af; font-family: 'Helvetica Neue', sans-serif; display: none; }
.install-tip.show { display: block; }

/* VISTA DE LISTA - estado */
#panel-lista { padding-bottom: 16px; }
#panel-stock { padding-bottom: 24px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div class="logo">Des<span>pensa</span></div>
      <button class="user-pill" onclick="openModal('user-modal')">
        <span class="user-dot" id="udot"></span>
        <span id="uname">...</span>
        <span style="font-size:10px;opacity:.5">▾</span>
      </button>
    </div>
    <div class="sync-bar">
      <span class="sync-dot" id="sdot" style="background:#16a34a"></span>
      <span id="stext">Sincronizado</span>
    </div>
    <div class="install-tip" id="install-tip"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stock')">📦 Stock</button>
    <button class="tab" onclick="switchTab('lista')">📋 Lista</button>
    <button class="tab" onclick="switchTab('presup')">💰 Presup.</button>
    <button class="tab" onclick="switchTab('add')">＋ Agregar</button>
  </div>

  <div class="panels">
    <!-- STOCK -->
    <div class="panel active" id="panel-stock">
      <div class="search-wrap">
        <input class="search-input" type="search" placeholder="Buscar producto..." id="search" oninput="renderStock()">
      </div>
      <div id="stock-list"></div>
    </div>

    <!-- LISTA DE COMPRAS -->
    <div class="panel" id="panel-lista">
      <div class="search-wrap">
        <input class="search-input" type="search" placeholder="Buscar en lista..." id="search-lista" oninput="renderShopList()">
      </div>
      <div id="shop-list"></div>
      <div class="running-total" id="running-total-bar" style="display:none">
        <div class="running-total-label">Total parcial</div>
        <div class="running-total-amount" id="running-total-val">—</div>
      </div>
    </div>

    <!-- PRESUPUESTO -->
    <div class="panel" id="panel-presup">
      <div id="budget-list"></div>
    </div>

    <!-- AGREGAR -->
    <div class="panel" id="panel-add">
      <div class="form-card">
        <label>Nombre</label>
        <input type="text" id="fn" placeholder="Ej: Leche entera">
        <label>Categoría</label>
        <select id="fc">
          <option value="supermercado">🏪 Supermercado</option>
          <option value="carniceria">🥩 Carnicería</option>
          <option value="verduleria">🥦 Verdulería</option>
          <option value="fiambreria">🧀 Fiambrería</option>
          <option value="limpieza">🧹 Limpieza e higiene</option>
          <option value="congelados">🧊 Congelados</option>
        </select>
        <div class="form-grid">
          <div><label>Stock</label><input type="number" id="fs" placeholder="0" min="0"></div>
          <div><label>Mínimo</label><input type="number" id="fm" placeholder="1" min="0"></div>
          <div><label>Precio $</label><input type="number" id="fp" placeholder="0"></div>
        </div>
        <label>Unidad</label>
        <select id="fu">
          <option>unidad</option><option>kg</option><option>g</option>

// ─── STORAGE ────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(products)); } catch(e){}
  if (typeof fbLoaded !== 'undefined' && fbLoaded) syncToFirebase();
}
function saveDone() {
  try { localStorage.setItem(DONE_KEY, JSON.stringify([...doneIds])); } catch(e){}
  if (typeof fbLoaded !== 'undefined' && fbLoaded) syncToFirebase();
}
function saveShopData() {
  try { localStorage.setItem(SHOP_KEY, JSON.stringify(shopData)); } catch(e){}
  if (typeof fbLoaded !== 'undefined' && fbLoaded) syncToFirebase();
}
function load() {
  try {
    const r = localStorage.getItem(STORE_KEY);
    products = r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULTS));
    if (!r) save();
    const d = localStorage.getItem(DONE_KEY);
    if (d) doneIds = new Set(JSON.parse(d));
    const u = localStorage.getItem(USER_KEY);
    if (u) currentUser = u;
    const s = localStorage.getItem(SHOP_KEY);
    if (s) shopData = JSON.parse(s);
  } catch(e) {
    products = JSON.parse(JSON.stringify(DEFAULTS));
  }
  document.getElementById('sdot').style.background = '#16a34a';
  document.getElementById('stext').textContent = 'Datos guardados en este dispositivo';
  applyUser(); renderAll();
}

// ─── MODALES ────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ─── TABS ───────────────────────────────────────────────
function switchTab(t) {
  const names = ['stock','lista','presup','add'];
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', names[i]===t));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  const bar = document.getElementById('running-total-bar');
  if (bar) bar.style.display = t === 'lista' ? 'flex' : 'none';
  if (bar && t !== 'lista') bar.style.display = 'none';
  if (t==='lista') renderShopList();
  else if (t==='stock') renderStock();
  else if (t==='presup') renderBudget();
}

function renderAll() { renderStock(); renderShopList(); renderBudget(); }

// ─── STOCK ──────────────────────────────────────────────

  const q = (document.getElementById('search')?.value||'').toLowerCase();
  const cont = document.getElementById('stock-list');
  cont.innerHTML = '';
  // Asegurar que todas las cats estén abiertas
  Object.keys(CATS).forEach(k => openCats.add(k));
  Object.keys(CATS).forEach(ck => {
    const cat = CATS[ck];
    const items = products.filter(p => p.cat===ck && (!q || p.name.toLowerCase().includes(q))).sort((a,b) => a.name.localeCompare(b.name, 'es'));
    if (!items.length) return;
    const isOpen = openCats.has(ck);
    const lowN = items.filter(needsBuying).length;
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.innerHTML = `
      <div class="cat-header" onclick="toggleCat('${ck}')">
        <span class="cat-emoji">${cat.emoji}</span>
        <span class="cat-label">${cat.label} <span style="font-weight:400;opacity:.5">(${items.length})</span></span>
        ${lowN?`<span class="low-badge">${lowN} bajo</span>`:''}
        <span class="cat-arrow ${isOpen?'open':''}">▾</span>
      </div>
      <div class="cat-body ${isOpen?'open':''}">
        ${items.map(p=>{
          const low = needsBuying(p);
          return `<div class="prod-row">
            <div class="prod-info">
              <div class="prod-name">${p.name}</div>
              <div class="prod-meta">
                <span>${p.unit}</span>
                ${p.price?`<span class="price-lbl" onclick="openPrice('${p.id}')" style="cursor:pointer">${fmt(p.price)}/${p.unit}</span>`:`<span style="font-style:italic;cursor:pointer;color:var(--text3)" onclick="openPrice('${p.id}')">+ precio</span>`}
                ${p.lastBought?`<span style="color:var(--text3)">🛒 ${fmtDate(p.lastBought)}</span>`:''}
                ${low?`<span class="low-warn">⚠ mín:${p.min}</span>`:''}
              </div>
            </div>
            <button class="edit-btn" title="Editar producto" onclick="openEditProduct('${p.id}')">✏️</button>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="chQty('${p.id}',-1)">−</button>
              <span class="qty-num ${p.stock===0?'qty-zero':''} ${low?'qty-low':''}" onclick="openStockModal('${p.id}')" title="Tocar para editar">${p.stock}</span>
              <button class="qty-btn" onclick="chQty('${p.id}',1)">+</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    cont.appendChild(sec);
  });
  if (!cont.children.length)
    cont.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>No encontrado</div>`;
}

function toggleCat(k) { openCats.has(k)?openCats.delete(k):openCats.add(k); renderStock(); }

function chQty(id, d) {
  const p = products.find(x=>x.id===id);
  if (!p) return;
  p.stock = Math.max(0, p.stock+d);
  save(); renderStock(); renderShopList(); renderBudget();
}

// ─── EDITAR STOCK DIRECTO ───────────────────────────────
function openStockModal(id) {
  const p = products.find(x=>x.id===id);
  if (!p) return;
  editStockId = id;
  document.getElementById('sm-title').textContent = p.name;
  document.getElementById('sm-sub').textContent = `Stock actual: ${p.stock} ${p.unit} · Mínimo: ${p.min}`;
  document.getElementById('sm-input').value = p.stock;
  document.getElementById('sm-date').value = p.lastBought ? p.lastBought.slice(0,10) : '';
  openModal('stock-modal');
  setTimeout(()=>{ const i=document.getElementById('sm-input'); i.focus(); i.select(); },200);
}
function saveStock() {
  const p = products.find(x=>x.id===editStockId);
  if (p) {
    const v = parseInt(document.getElementById('sm-input').value);
    p.stock = isNaN(v) ? p.stock : Math.max(0, v);
    const dateVal = document.getElementById('sm-date').value;
    if (dateVal) p.lastBought = new Date(dateVal).toISOString();
    save(); renderAll();
  }
  closeModal('stock-modal');
}

// ─── EDITAR PRECIO (desde stock) ───────────────────────
function openPrice(id) {
  const p = products.find(x=>x.id===id);
  if (!p) return;
  editPriceId = id;
  document.getElementById('pm-title').textContent = p.name;
  document.getElementById('pm-unit').textContent = p.unit;
  document.getElementById('pm-input').value = p.price||'';
  openModal('price-modal');
  setTimeout(()=>document.getElementById('pm-input').focus(),200);
}
function savePrice() {
  const p = products.find(x=>x.id===editPriceId);
  if (p) { p.price = parseFloat(document.getElementById('pm-input').value)||0; save(); renderAll(); }
  closeModal('price-modal');
}

// ─── EDITAR / ELIMINAR PRODUCTO ─────────────────────────
function openEditProduct(id) {
  const p = products.find(x=>x.id===id);
  if (!p) return;
  editProductId = id;
  document.getElementById('em-name').value = p.name;
  document.getElementById('em-cat').value = p.cat;
  document.getElementById('em-min').value = p.min;
  document.getElementById('em-unit').value = p.unit;
  openModal('edit-modal');
  setTimeout(()=>document.getElementById('em-name').focus(),200);
}
function saveEdit() {
  const p = products.find(x=>x.id===editProductId);
  if (p) {
    p.name = document.getElementById('em-name').value.trim() || p.name;
    p.cat  = document.getElementById('em-cat').value;
    p.min  = parseInt(document.getElementById('em-min').value) || p.min;
    p.unit = document.getElementById('em-unit').value;
    save(); renderAll();
  }
  closeModal('edit-modal');
}
function deleteProduct() {
  if (!confirm('¿Eliminar este producto?')) return;
  products = products.filter(x=>x.id!==editProductId);
  save(); renderAll();
  closeModal('edit-modal');
}

// ─── LISTA DE COMPRAS ───────────────────────────────────
function getShopEntry(p) {
  const faltante = Math.max(1, p.min - p.stock);
  if (!shopData[p.id]) {
    shopData[p.id] = { qty: faltante, price: p.price || 0 };
  } else {
    // Siempre recalcular la cantidad basada en stock actual y mínimo
    shopData[p.id].qty = faltante;
    if (!shopData[p.id].price && p.price) shopData[p.id].price = p.price;
  }
  return shopData[p.id];
}

function updateShopField(id, field, value) {
  if (!shopData[id]) shopData[id] = { qty: 1, price: 0 };
  const v = parseFloat(value) || 0;
  shopData[id][field] = field === 'qty' ? Math.max(0, Math.round(v)) : Math.max(0, v);
  saveShopData();
  updateRunningTotal();
}

function updateRunningTotal() {
  const needed = products.filter(p => needsBuying(p) || doneIds.has(p.id));
  let total = 0;
  needed.forEach(p => {
    const entry = shopData[p.id];
    if (entry && entry.qty > 0 && entry.price > 0) {
      total += entry.qty * entry.price;
    }
  });
  const el = document.getElementById('running-total-val');
  if (el) el.textContent = total > 0 ? fmt(total) : '—';
  const bar = document.getElementById('running-total-bar');
  if (bar) bar.style.display = 'flex';
}

function renderShopList() {
  const cont = document.getElementById('shop-list');
  const needed = products.filter(p => needsBuying(p) || doneIds.has(p.id));

  if (!needed.length) {
    cont.innerHTML = `<div class="empty"><div class="empty-icon">✅</div>¡Todo completo!</div>`;
    return;
  }

  // Inicializar shopData para los que no tienen entrada
  needed.forEach(p => getShopEntry(p));

  let html = '';
  const ql = (document.getElementById('search-lista')?.value || '').toLowerCase();
  const filteredNeeded = ql ? needed.filter(p => p.name.toLowerCase().includes(ql)) : needed;
  Object.keys(CATS).forEach(ck => {
    const cat = CATS[ck];
    const items = filteredNeeded.filter(p => p.cat === ck).sort((a,b) => a.name.localeCompare(b.name, 'es'));
    if (!items.length) return;
    html += `<div class="section-sep">${cat.emoji} ${cat.label}</div>`;
    items.forEach(p => {
      const done = doneIds.has(p.id);
      const entry = shopData[p.id] || { qty: 1, price: p.price || 0 };
      const sub = entry.qty > 0 && entry.price > 0 ? entry.qty * entry.price : 0;
      html += `<div class="shop-card" id="sc-${p.id}">
        <div class="shop-card-top">
          <div class="check-circle ${done?'done':''}" onclick="toggleDone('${p.id}')">${done?'✓':''}</div>
          <div class="shop-info">
            <div class="shop-name ${done?'done':''}">${p.name}</div>
            <div class="shop-sub">Stock: ${p.stock} ${p.unit} · Mín: ${p.min}</div>
          </div>
          ${sub > 0 ? `<div class="shop-price">${fmt(sub)}</div>` : '<div style="font-size:11px;color:var(--text3)">—</div>'}
        </div>
        <div class="shop-fields">
          <div class="shop-field">
            <label>Cantidad</label>
            <input type="number" inputmode="numeric" value="${entry.qty}" min="0"
              onchange="updateShopField('${p.id}','qty',this.value); rerenderShopCard('${p.id}')">
          </div>
          <div class="shop-field">
            <label>Precio $ / ${p.unit}</label>
            <input type="number" inputmode="decimal" value="${entry.price || ''}" placeholder="—"
              onchange="updateShopField('${p.id}','price',this.value); rerenderShopCard('${p.id}')">
          </div>
        </div>
        ${sub > 0 ? `<div class="shop-subtotal">Subtotal: <span>${fmt(sub)}</span></div>` : ''}
      </div>`;
    });
  });

  // Total parcial sticky + botones
  html += `
    <button class="btn-clear" onclick="verResumen()">Ver resumen y confirmar compra</button>
    <button class="btn-clear-sec" onclick="limpiarLista()">Vaciar lista sin actualizar stock</button>
  `;

  cont.innerHTML = html;
  updateRunningTotal();
}

function rerenderShopCard(id) {
  // Re-renderiza solo el precio y subtotal de una card sin perder el foco
  const p = products.find(x => x.id === id);
  if (!p) return;
  const entry = shopData[id] || { qty: 1, price: 0 };
  const sub = entry.qty > 0 && entry.price > 0 ? entry.qty * entry.price : 0;
  const card = document.getElementById('sc-' + id);
  if (!card) return;
  // Actualizar precio en el header
  const priceEl = card.querySelector('.shop-price, [style*="text3"]');
  if (priceEl) priceEl.outerHTML = sub > 0 ? `<div class="shop-price">${fmt(sub)}</div>` : '<div style="font-size:11px;color:var(--text3)">—</div>';
  // Actualizar subtotal
  let subEl = card.querySelector('.shop-subtotal');
  if (sub > 0) {
    if (subEl) subEl.innerHTML = `Subtotal: <span>${fmt(sub)}</span>`;
    else { const s = document.createElement('div'); s.className='shop-subtotal'; s.innerHTML=`Subtotal: <span>${fmt(sub)}</span>`; card.appendChild(s); }
  } else {
    if (subEl) subEl.remove();
  }
  updateRunningTotal();
}

function toggleDone(id) {
  doneIds.has(id) ? doneIds.delete(id) : doneIds.add(id);
  saveDone();
  // Solo actualizar clase del check-circle sin re-renderizar todo
  const card = document.getElementById('sc-' + id);
  if (card) {
    const cc = card.querySelector('.check-circle');
    const sn = card.querySelector('.shop-name');
    const done = doneIds.has(id);
    if (cc) { cc.classList.toggle('done', done); cc.textContent = done ? '✓' : ''; }
    if (sn) sn.classList.toggle('done', done);
  }
}

function verResumen() {
  const needed = products.filter(p => needsBuying(p) || doneIds.has(p.id));
  let grand = 0;
  const bycat = {};
  Object.keys(CATS).forEach(k => { bycat[k] = { items: [], total: 0 }; });

  needed.forEach(p => {
    const entry = shopData[p.id] || { qty: 0, price: 0 };
    const sub = entry.qty > 0 && entry.price > 0 ? entry.qty * entry.price : 0;
    grand += sub;
    bycat[p.cat].total += sub;
    bycat[p.cat].items.push({ name: p.name, qty: entry.qty, unit: p.unit, sub });
  });

  let html = `<div class="resumen-card">
    <div class="resumen-title">Total de la compra</div>
    <div class="resumen-total">${grand > 0 ? fmt(grand) : '—'}</div>
    <div class="resumen-sub">${needed.length} productos</div>
  </div>`;

  Object.keys(CATS).forEach(k => {
    if (!bycat[k].items.length) return;
    const cat = CATS[k];
    html += `<div class="budget-card">
      <div class="bcat-row">
        <span style="font-size:18px">${cat.emoji}</span>
        <span class="bcat-name">${cat.label}</span>
        <span class="bcat-total">${bycat[k].total > 0 ? fmt(bycat[k].total) : '—'}</span>
      </div>
      <div>${bycat[k].items.map(i =>
        `<div class="bitem">
          <span class="bitem-name">${i.name} <span style="opacity:.5">${i.qty} ${i.unit}</span></span>
          <span class="bitem-price">${i.sub > 0 ? fmt(i.sub) : '—'}</span>
        </div>`
      ).join('')}</div>
    </div>`;
  });

  document.getElementById('resumen-content').innerHTML = html;
  openModal('resumen-modal');
}

function confirmarCompra() {
  const needed = products.filter(p => needsBuying(p) || doneIds.has(p.id));
  const hoy = new Date().toISOString();
  needed.forEach(p => {
    const entry = shopData[p.id];
    const qty = Math.max(1, p.min - p.stock);
    if (qty > 0) {
      p.stock = p.stock + qty;
      p.lastBought = hoy;
    }
    if (entry && entry.price > 0) p.price = entry.price;
  });
  // Limpiar lista
  doneIds.clear();
  shopData = {};
  save(); saveDone(); saveShopData();
  closeModal('resumen-modal');
  renderAll();
  switchTab('stock');
}

function limpiarLista() {
  if (!confirm('¿Vaciar la lista sin actualizar el stock?')) return;
  doneIds.clear();
  shopData = {};
  saveDone(); saveShopData();
  renderShopList();
}

// ─── PRESUPUESTO ────────────────────────────────────────
function renderBudget() {
  const cont = document.getElementById('budget-list');
  const needed = products.filter(needsBuying);
  let grand = 0;
  const cd = {};
  Object.keys(CATS).forEach(k => { cd[k] = { total: 0, items: [] }; });
  needed.forEach(p => {
    const qty = Math.max(1, p.min - p.stock + 1);
    const sub = p.price ? p.price * qty : 0;
    grand += sub; cd[p.cat].total += sub;
    cd[p.cat].items.push({ name: p.name, qty, unit: p.unit, price: p.price, sub });
  });
  const maxT = Math.max(...Object.values(cd).map(c => c.total), 1);
  let html = `<div class="grand-card">
    <div class="grand-lbl">Total estimado</div>
    <div class="grand-num">${fmt(grand)}</div>
    <div class="grand-sub">${needed.length} productos por reponer</div>
  </div>`;
  Object.keys(CATS).forEach(k => {
    const cat = CATS[k], d = cd[k];
    if (!d.items.length) return;
    const pct = Math.round(d.total / maxT * 100);
    html += `<div class="budget-card">
      <div class="bcat-row">
        <span style="font-size:18px">${cat.emoji}</span>
        <span class="bcat-name">${cat.label}</span>
        <span class="bcat-total">${fmt(d.total)}</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>
      <div>${d.items.map(i =>
        `<div class="bitem">
          <span class="bitem-name">${i.name} <span style="opacity:.5">${i.qty} ${i.unit}</span></span>
          <span class="bitem-price">${i.price ? fmt(i.sub) : '—'}</span>
        </div>`
      ).join('')}</div>
    </div>`;
  });
  if (!needed.length) html += `<div class="empty"><div class="empty-icon">✅</div>No falta nada</div>`;
  cont.innerHTML = html;
}

// ─── AGREGAR PRODUCTO ───────────────────────────────────
function addProduct() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { alert('Ingresá un nombre'); return; }
  products.push({
    id: 'p' + Date.now(),
    name,
    cat: document.getElementById('fc').value,
    stock: parseInt(document.getElementById('fs').value) || 0,
    min: parseInt(document.getElementById('fm').value) || 1,
    price: parseFloat(document.getElementById('fp').value) || 0,
    unit: document.getElementById('fu').value
  });
  ['fn','fs','fm','fp'].forEach(id => document.getElementById(id).value = '');
  openCats.add(document.getElementById('fc').value);
  save(); switchTab('stock');
}

// ─── PWA INSTALL ────────────────────────────────────────

  const tip = document.getElementById('install-tip');

if ('serviceWorker' in navigator) {

// ─── FIREBASE ───────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNNX2zS8rEiuGnVOt3NjMO32JBKiR8HPE",
  authDomain: "despensa-3a0ed.firebaseapp.com",
  databaseURL: "https://despensa-3a0ed-default-rtdb.firebaseio.com",
  projectId: "despensa-3a0ed",
  storageBucket: "despensa-3a0ed.firebasestorage.app",
  messagingSenderId: "976544983894",
  appId: "1:976544983894:web:525a1a619f93b1df3844f7"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

let fbLoaded = false;
let syncTimeout = null;
let localWriteTs = 0;

function syncToFirebase() {
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    try {
      localWriteTs = Date.now();
      set(ref(db, 'despensa'), {
        products: products,
        doneIds: [...doneIds],
        shopData: shopData,
        updatedAt: localWriteTs
      });
      document.getElementById('sdot').style.background = '#16a34a';
      document.getElementById('stext').textContent = 'Sincronizado';
    } catch(e) {
      document.getElementById('sdot').style.background = '#d97706';
      document.getElementById('stext').textContent = 'Error al sincronizar';
    }
  }, 800);
}

function initFirebase() {
  document.getElementById('sdot').style.background = '#d97706';
  document.getElementById('stext').textContent = 'Conectando...';

  onValue(ref(db, 'despensa'), (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      syncToFirebase();
      fbLoaded = true;
      return;
    }
    if (data.updatedAt && data.updatedAt === localWriteTs) {
      fbLoaded = true;
      document.getElementById('sdot').style.background = '#16a34a';
      document.getElementById('stext').textContent = 'Sincronizado';
      return;
    }
    if (data.products) { products = data.products; try { localStorage.setItem(STORE_KEY, JSON.stringify(products)); } catch(e){} }
    if (data.doneIds)  { doneIds = new Set(data.doneIds); try { localStorage.setItem(DONE_KEY, JSON.stringify([...doneIds])); } catch(e){} }
    if (data.shopData) { shopData = data.shopData; try { localStorage.setItem(SHOP_KEY, JSON.stringify(shopData)); } catch(e){} }
    document.getElementById('sdot').style.background = '#16a34a';
    document.getElementById('stext').textContent = 'Sincronizado';
    fbLoaded = true;
    renderAll();
  }, (error) => {
    document.getElementById('sdot').style.background = '#dc2626';
    document.getElementById('stext').textContent = 'Sin conexión — datos locales';
  });
}

// Las funciones save/saveDone/saveShopData ya están definidas arriba;
// initFirebase llama a syncToFirebase internamente vía onValue.

load();
initFirebase();

// Exponer funciones al scope global (necesario con type="module")
Object.assign(window, {
  switchTab, toggleCat, chQty, openStockModal, saveStock,
  openPrice, savePrice, openEditProduct, saveEdit, deleteProduct,
  toggleDone, updateShopField, rerenderShopCard, verResumen,
  confirmarCompra, limpiarLista, addProduct, installApp,
  openModal, closeModal, setUser, renderStock, renderShopList
});
</script>
